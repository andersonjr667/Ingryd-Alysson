<!DOCTYPE html>
<html>
<head>
    <title>Test Presents</title>
</head>
<body>
    <div id="test"></div>
    <script>
        console.log('1. Script carregado');
        
        // Teste 1: Verificar se fetch está disponível
        console.log('2. Fetch disponível?', typeof fetch);
        
        // Teste 2: Fazer requisição à API
        fetch('/api/presentes')
            .then(res => {
                console.log('3. Resposta recebida:', res.status);
                return res.json();
            })
            .then(data => {
                console.log('4. JSON recebido:', data.length, 'presentes');
                document.getElementById('test').innerHTML = `<h1>✅ ${data.length} presentes carregados!</h1>`;
                console.log('5. Primeiros 3 presentes:', data.slice(0, 3).map(p => ({ id: p.id, nome: p.nome, preco: p.preco })));
            })
            .catch(err => {
                console.error('❌ Erro:', err);
                document.getElementById('test').innerHTML = `<h1>❌ Erro: ${err.message}</h1>`;
            });
            
        console.log('6. Teste iniciado');
    </script>
</body>
</html>
